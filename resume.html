<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume — Phạm Phi Khanh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* ── THEME SETUP ── */
        :root {
            --bg-color: #f8fafc;
            --accent: #059669;
            --accent-light: rgba(5, 150, 105, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(226, 232, 240, 0.8);
            --shadow-default: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            --shadow-hover: 0 35px 60px -15px rgba(5, 150, 105, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }

        /* ── ANIMATED BACKGROUND ── */
        .grid-bg {
            position: fixed; inset: 0; z-index: -10;
            background-image: radial-gradient(var(--accent-light) 1.5px, transparent 1.5px);
            background-size: 35px 35px;
        }
        .ambient-orb {
            position: fixed; border-radius: 50%; filter: blur(120px);
            z-index: -9; opacity: 0.35;
            animation: orbMove 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 500px; height: 500px; background: #a7f3d0; top: -5%; left: -5%; }
        .orb-2 { width: 600px; height: 600px; background: #bfdbfe; bottom: -5%; right: -5%; animation-delay: -5s; }
        
        @keyframes orbMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.1); }
        }

        /* ── NAVIGATION ── */
        nav {
            position: fixed; top: 0; width: 100%; height: 75px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px); z-index: 1000;
            border-bottom: 1px solid var(--border);
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes slideDown { 0% { transform: translateY(-100%); } 100% { transform: translateY(0); } }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 700; transition: 0.3s; }
        .nav-links a.active, .nav-links a:hover { color: var(--accent); }

        /* ── SCROLL ANIMATIONS ── */
        .reveal {
            opacity: 0; transform: translateY(40px) scale(0.98); filter: blur(10px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.visible { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        .delay-1 { transition-delay: 0.2s; }

        /* ── RESUME LAYOUT ── */
        .container { max-width: 1050px; margin: 0 auto; padding: 130px 5% 100px; }
        
        .section-header { text-align: center; margin-bottom: 50px; display: flex; flex-direction: column; align-items: center; }
        .section-header h1 { font-size: clamp(2.5rem, 4vw, 4rem); letter-spacing: -2px; margin-bottom: 15px; font-weight: 800; }
        .section-header p { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto 30px; font-weight: 500; }

        /* ── DOWNLOAD BUTTON ── */
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--text-main);
            color: #fff;
            padding: 14px 28px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .download-btn:hover {
            background: var(--accent);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px rgba(5, 150, 105, 0.3);
        }
        .download-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        /* ── RESUME PDF CONTAINER ── */
        .resume-paper {
            width: 100%;
            height: 1200px; /* Chiều cao cố định để hiển thị đủ 1 trang PDF A4 */
            background: #fff;
            border-radius: 16px;
            box-shadow: var(--shadow-default);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .resume-paper:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(5, 150, 105, 0.2);
        }

        .resume-pdf {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Responsive cho khung PDF trên điện thoại */
        @media (max-width: 992px) {
            .resume-paper { height: 900px; }
        }
        @media (max-width: 768px) {
            .container { padding-top: 110px; }
            .resume-paper { height: 600px; border-radius: 12px; }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <nav>
        <div class="logo">Phi<span>Khanh</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About me</a></li>
            <li><a href="education.html">Education</a></li>
            <li><a href="teamwork.html">Teamwork & Experience</a></li>
            <li><a href="achievements.html" class="nav-item">Achievements</a></li>
            <li><a href="#" class="active">Resume</a></li>
            <li><a href="self-eval.html">Self-Eval</a></li>
             <li><a href="roadmap.html" >Roadmap</a></li>
                  <li><a href="pdp.html">Dev Plan</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        
        <header class="section-header reveal">
            <h1>Curriculum Vitae</h1>
            <p>A comprehensive overview of my academic background, technical skills, and collaborative leadership experiences.</p>
            
            <a href="resume.pdf" download class="download-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Download PDF
            </a>
        </header>

        <div class="resume-paper reveal delay-1">
            <iframe 
                src="resume.pdf#toolbar=0&navpanes=0&scrollbar=0&view=FitH" 
                class="resume-pdf" 
                title="Resume Phạm Phi Khanh">
                <p style="text-align:center; padding: 2rem;">
                    Trình duyệt của bạn không hỗ trợ xem trực tiếp PDF. <br>
                    Vui lòng <a href="resume.pdf" style="color:var(--accent);">tải xuống tại đây</a>.
                </p>
            </iframe>
        </div>

    </div>

    <script>
        // Hiệu ứng cuộn mượt mà
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>

</body>
</html>
